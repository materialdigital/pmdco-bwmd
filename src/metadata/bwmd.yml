# PURL configuration for http://purl.obolibrary.org/obo/bwmd

idspace: BWMD
base_url: /obo/bwmd

products:
- bwmd.owl: https://raw.githubusercontent.com/materialdigital/materialdigital/pmdco-bwmd/main/bwmd.owl
- bwmd.obo: https://raw.githubusercontent.com/materialdigital/materialdigital/pmdco-bwmd/main/bwmd.obo

term_browser: ontobee
example_terms:
- BWMD_0000000

entries:

- prefix: /releases/
  replacement: https://raw.githubusercontent.com/materialdigital/materialdigital/pmdco-bwmd/v

- prefix: /tracker/
  replacement: https://github.com/materialdigital/materialdigital/pmdco-bwmd/issues

- prefix: /about/
  replacement: http://www.ontobee.org/ontology/BWMD?iri=http://purl.obolibrary.org/obo/

## generic fall-through, serve direct from github by default
- prefix: /
  replacement: https://raw.githubusercontent.com/materialdigital/materialdigital/pmdco-bwmd/main/
